apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reposilite-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: homelab-prod
  source:
    repoURL: git@github.com:awesomejt/homelab-k3s.git
    targetRevision: main
    path: apps/infrastructure/reposilite/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: reposilite
  syncPolicy:
    automated: