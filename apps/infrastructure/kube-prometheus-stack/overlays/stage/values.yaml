grafana:
  admin:
    existingSecret: "grafana-admin"
    userKey: "admin-user"
    passwordKey: "admin-password"
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.stage.lab
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.stage.lab
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-lab

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.stage.lab
    tls:
      - secretName: prometheus-tls
        hosts:
          - prometheus.stage.lab
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-lab

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.stage.lab
    tls:
      - secretName: alertmanager-tls
        hosts:
          - alertmanager.stage.lab
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-lab