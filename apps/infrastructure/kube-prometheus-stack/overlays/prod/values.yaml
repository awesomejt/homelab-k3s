grafana:
  admin:
    existingSecret: "grafana-admin"
    userKey: "admin-user"
    passwordKey: "admin-password"
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana-prod.taylor.lan
    tls:
      - secretName: grafana-prod-tls
        hosts:
          - grafana-prod.taylor.lan
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

prometheus:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus-prod.taylor.lan
    tls:
      - secretName: prometheus-prod-tls
        hosts:
          - prometheus-prod.taylor.lan
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod

alertmanager:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager-prod.taylor.lan
    tls:
      - secretName: alertmanager-prod-tls
        hosts:
          - alertmanager-prod.taylor.lan
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod