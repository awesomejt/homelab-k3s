apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reposilite
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - reposilite.taylor.lan
    secretName: reposilite-tls
  rules:
  - host: reposilite.taylor.lan
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: reposilite
            port:
              number: 80